# render.yaml — Render Blueprint for the NestJS API
# Place in repo root so Render auto-detects it

services:
  - type: web
    name: rishicodes-api
    runtime: node
    region: singapore
    plan: free
    buildCommand: |
      pnpm install --frozen-lockfile &&
      pnpm --filter @rishicodes/db generate &&
      pnpm --filter @rishicodes/db migrate:deploy &&
      pnpm build:api
    startCommand: node apps/api/dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ADMIN_ORIGIN
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: API_BASE_URL
        sync: false
      - key: GITHUB_PAT
        sync: false
      - key: GITHUB_OWNER
        sync: false
      - key: PUBLIC_SITE_URL
        sync: false
      - key: REVALIDATE_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
